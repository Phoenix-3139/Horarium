name: deploy pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue extra deploys mid-flight; the latest push wins.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt into the Node.js 24 runtime ahead of GitHub's June-2026 forced
  # switch. Silences the deprecation warning the job otherwise prints.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run so the user doesn't have to
          # toggle it in repo settings before the workflow can deploy.
          enablement: true
      - name: Upload planner/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: planner
      - id: deployment
        uses: actions/deploy-pages@v4
