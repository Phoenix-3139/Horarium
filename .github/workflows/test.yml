name: tests

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node.js 24 for action runtimes (silences GitHub's
  # June-2026 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 (current LTS as of late 2025). Same major version
          # the FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 flag pins the action
          # runtimes to, so test + deploy live on the same Node.
          node-version: 24
          cache: npm
          cache-dependency-path: planner/package-lock.json
      - run: npm ci
      - run: npx vitest run
